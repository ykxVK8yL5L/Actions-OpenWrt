name: Build OpenWrt IPK

on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: "OpenWrt SDK URL (.tar.xz)"
        required: true
        default: ""
      packages:
        description: "Packages to build (space or newline separated)"
        required: true
        default: ""

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Parse package list
        id: set-matrix
        run: |
          INPUT="${{ github.event.inputs.packages }}"
          PKGS=$(echo "$INPUT" | tr '\n' ' ' | xargs -n1)
          JSON=$(printf '%s\n' $PKGS | jq -R . | jq -cs .)
          echo "Packages:"
          echo "$JSON"
          echo "matrix={\"package\":$JSON}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Install dependencies
        run: |
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)' 

      - name: Download SDK
        run: |
          wget "${{ github.event.inputs.sdk_url }}" -O sdk.tar.xz
          mkdir sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1

      - name: Update & install feeds
        working-directory: sdk
        env:
          DIY_SH: diy-immortalwrt-sdk.sh
        run: |
          chmod +x $GITHUB_WORKSPACE/$DIY_SH
          $GITHUB_WORKSPACE/$DIY_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f
        
      - name: Select package
        working-directory: sdk
        run: |
          echo "CONFIG_PACKAGE_${{ matrix.package }}=m" >> .config
          make defconfig

      - name: Build package
        working-directory: sdk
        run: |
          make package/${{ matrix.package }}/compile V=s -j$(nproc)

      - name: Collect IPK
        working-directory: sdk
        run: |
          mkdir -p ../output
          find bin/packages -name "*.ipk" -exec cp {} ../output/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.package }}
          path: output/*.ipk
