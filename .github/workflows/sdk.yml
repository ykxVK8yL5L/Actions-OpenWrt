name: Build OpenWrt IPK

on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: "OpenWrt SDK URL (.tar.xz)"
        required: true
        default: ""
      packages:
        description: "Packages to build (space or newline separated)"
        required: true
        default: ""

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Parse package list
        id: set-matrix
        run: |
          PKGS=$(echo "${{ github.event.inputs.packages }}" | tr '\n' ' ')
          JSON=$(printf '%s\n' $PKGS | jq -R . | jq -s .)
          echo "matrix={\"package\":$JSON}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Download SDK
        run: |
          wget "${{ github.event.inputs.sdk_url }}" -O sdk.tar.xz
          mkdir sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1

      - name: Update & install feeds
        working-directory: sdk
        env:
          CONFIG_FILE: x86_64/immortalwrt.config
          DIY_P1_SH: diy-part1.sh
          DIY_P2_SH: diy-immortalwrt.sh
          MRG_ADD_SH: x86_64/x86_64.sh
        run: |
          chmod +x $DIY_P2_SH
          chmod +x $MRG_ADD_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$MRG_ADD_SH

      - name: Select package
        working-directory: sdk
        run: |
          echo "CONFIG_PACKAGE_${{ matrix.package }}=m" >> .config
          make defconfig

      - name: Build package
        working-directory: sdk
        run: |
          make package/${{ matrix.package }}/compile V=s -j$(nproc)

      - name: Collect IPK
        working-directory: sdk
        run: |
          mkdir -p ../output
          find bin/packages -name "*.ipk" -exec cp {} ../output/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.package }}
          path: output/*.ipk
